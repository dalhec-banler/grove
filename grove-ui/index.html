<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/apps/grove/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/apps/grove/grove-icon.svg" />
    <link rel="apple-touch-icon" href="/apps/grove/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3A6BC5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Grove" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Grove</title>
    <script>
      window.ship = document.cookie
        .split('; ')
        .find(row => row.startsWith('urbauth-'))
        ?.split('=')[0]
        ?.replace('urbauth-', '') || '';

      // Capture PWA install prompt ASAP — before React loads
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
