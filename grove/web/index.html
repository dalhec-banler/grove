<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/apps/grove/grove-icon.svg" />
    <link rel="apple-touch-icon" href="/apps/grove/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3A6BC5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Grove" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Grove</title>
    <script>
      window.ship = document.cookie
        .split('; ')
        .find(row => row.startsWith('urbauth-'))
        ?.split('=')[0]
        ?.replace('urbauth-', '') || '';
    </script>
    <script>
      // Capture beforeinstallprompt as early as possible — Chrome fires it
      // before React mounts, so InstallBanner (which reads window.__pwaPrompt)
      // would otherwise never see it and the Install button never appears (H7).
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
      window.addEventListener('appinstalled', function () {
        window.__pwaPrompt = null;
      });
    </script>
    <script type="module" crossorigin src="/apps/grove/assets/index.D_rRP6r1.js"></script>
    <link rel="stylesheet" crossorigin href="/apps/grove/assets/index.Cvc9ou1u.css">
  <link rel="manifest" href="/apps/grove/manifest.webmanifest"><script id="vite-plugin-pwa:inline-sw">if('serviceWorker' in navigator) {window.addEventListener('load', () => {navigator.serviceWorker.register('/apps/grove/sw-custom.js', { scope: '/apps/grove/' })})}</script></head>
  <body>
    <div id="root"></div>
  </body>
</html>
